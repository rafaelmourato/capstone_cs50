{% extends "listsapp/layout.html" %}

{% block body %}
<div class="container d-flex align-items-center justify-content-center" style="min-height: 85vh; padding-top: 20px; padding-bottom: 20px;">
    <div class="row justify-content-center w-100">
        <div class="col-md-6 col-lg-5">
            
            <div class="card shadow border-0 rounded-lg p-4">
                <div class="card-body">
                    
                    <h2 class="fw-bold mb-4 text-center text-secondary">Create Account</h2>

                    {% if message %}
                        <div class="alert alert-danger p-2 small text-center" role="alert">
                            {{ message }}
                        </div>
                    {% endif %}

                    <form action="{% url 'register' %}" method="post">
                        {% csrf_token %}
                        
                        <div class="form-group mb-3">
                            <label class="small fw-bold text-muted ms-2">Username</label>
                            <input autofocus class="form-control rounded-pill px-4" type="text" name="username" placeholder="Choose a username" required>
                        </div>

                        <div class="form-group mb-3">
                            <label class="small fw-bold text-muted ms-2">Email</label>
                            <input class="form-control rounded-pill px-4" type="email" name="email" placeholder="email@example.com" required>
                        </div>

                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group mb-3">
                                    <label class="small fw-bold text-muted ms-2">Password</label>
                                    <input class="form-control rounded-pill px-4" type="password" name="password" placeholder="Password" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group mb-3">
                                    <label class="small fw-bold text-muted ms-2">Confirm</label>
                                    <input class="form-control rounded-pill px-4" type="password" name="confirmation" placeholder="Repeat" required>
                                </div>
                            </div>
                        </div>

                        <div class="form-group form-check mb-4 mt-2 ms-2">
                            <input class="form-check-input" type="checkbox" name="is_supermarket" id="is_supermarket">
                            <label class="form-check-label small text-muted fw-bold" for="is_supermarket">
                                I am a supermarket! 📦
                            </label>
                        </div>

                        <div class="d-grid mb-3">
                            <input class="btn btn-primary rounded-pill fw-bold py-2" type="submit" value="Register">
                        </div>
                    </form>

                    <div class="text-center mt-4">
                        <small class="text-muted">
                            Already have an account? <a href="{% url 'login' %}" class="text-decoration-none fw-bold">Log In here.</a>
                        </small>
                    </div>

                </div>
            </div>

            <div class="text-center mt-3">
                <a href="{% url 'index' %}" class="text-muted text-decoration-none small">
                    <i class="bi bi-arrow-left"></i> Back to home
                </a>
            </div>

        </div>
    </div>
</div>
{% endblock %}
